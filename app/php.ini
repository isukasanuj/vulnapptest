; --- Intentionally REMOVED finding #06 (PHP version disclosure) ---
; expose_php Off => the X-Powered-By: PHP/8.3.x header is not emitted.
expose_php = Off

; Realistic-but-loose runtime settings for the practice lab.
display_errors = Off
log_errors = On
upload_max_filesize = 16M
post_max_size = 20M
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
