<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        # Route every non-file request through the front controller
        FallbackResource /index.php
    </Directory>

    # Uploaded files are served through a PHP controller, never directly.
    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
